apiVersion: batch/v1
kind: Job
metadata:
  name: cosi-sample-upload
spec:
  template:
    spec:
      containers:
      - name: mc
        image: minio/mc:latest
        command:
        - /bin/sh
        - -c
        - |
           set -eu
           cat /root/.mc/config.json
           bucket="$(cat /root/.mc/BUCKET_NAME)"

           for attempt in $(seq 1 24); do
             if mc ls "cosi/${bucket}" >/dev/null 2>&1; then
               break
             fi
             echo "waiting for bucket ${bucket} to be reachable over s3 (${attempt}/24)"
             sleep 5
           done

           for attempt in $(seq 1 12); do
             if date | mc pipe "cosi/${bucket}/test.txt"; then
               mc rm "cosi/${bucket}/test.txt"
               exit 0
             fi
             echo "upload failed for bucket ${bucket} (${attempt}/12), retrying"
             sleep 5
           done

           echo "upload failed for bucket ${bucket} after retries" >&2
           exit 1
        volumeMounts:
        - name: s3-credentials
          mountPath: /cosi
          readOnly: true
        - name: mc
          mountPath: /root/.mc
      initContainers:
        - name: populate-creds
          image: busybox:stable
          command:
            - 'sh'
            - '-c'
            - |
              set -ex
              wget -O /usr/bin/jq https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64
              chmod +x /usr/bin/jq
              # Extract credentials from the mounted Secret
              cat /cosi/BucketInfo | jq -r '.spec.bucketName' > /root/.mc/BUCKET_NAME
              ENDPOINT="https://$(cat /cosi/BucketInfo | jq -r '.spec.secretS3.endpoint')"
              ACCESS_KEY=$(cat /cosi/BucketInfo | jq -r '.spec.secretS3.accessKeyID')
              SECRET_KEY=$(cat /cosi/BucketInfo | jq -r '.spec.secretS3.accessSecretKey')
              mkdir -p /root/.mc

              jq -n --arg url "${ENDPOINT}" \
                --arg accessKey "${ACCESS_KEY}" \
                --arg secretKey "${SECRET_KEY}"  \
                '{"version": "10", "aliases": {"cosi": {"url": $url, "accessKey": $accessKey, "secretKey": $secretKey, "api": "S3v4", "path": "auto"}}}' > /root/.mc/config.json
          volumeMounts:
            - name: s3-credentials
              mountPath: /cosi
              readOnly: true
            - name: mc
              mountPath: /root/.mc
      volumes:
      - name: s3-credentials
        secret:
          secretName: s3-credentials
      - name: mc
        emptyDir:
          sizeLimit: 50Mi
      restartPolicy: Never
  backoffLimit: 1
